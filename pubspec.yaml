name: peoplesync
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.1

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^4.5.0
  firebase_auth: ^6.1.3
  cloud_firestore: ^6.1.1
  firebase_storage: ^13.1.0
  cupertino_icons: ^1.0.8
  provider: ^6.0.5
  go_router: ^17.1.0
  get_it: ^9.2.1
  pretty_qr_code: ^3.6.0
  mobile_scanner: ^7.2.0
  image_picker: ^1.1.2
  url_launcher: ^6.3.1
  file_picker: ^10.3.2
  http: ^1.2.2
  flutter_dotenv: ^5.2.1
  supabase_flutter: ^2.8.4
  flutter_contacts: ^2.0.2
  permission_handler: ^12.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/images/
    - assets/icons/
    - assets/animations/

  fonts:
    - family: Roboto
      fonts:
        - asset: assets/fonts/Roboto-Regular.ttf
        - asset: assets/fonts/Roboto-Bold.ttf
          weight: 700
