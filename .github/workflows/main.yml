# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: Flutter CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # 1. Configurar Flutter (Añadimos 'flutter-version' para garantizar una versión reciente con 'flutter format')
      - name: Setup Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          # Especificamos una versión estable conocida y reciente para asegurar la compatibilidad con 'flutter format'
          flutter-version: '3.22.0' 

      # 2. Obtener dependencias con flutter pub get
      - name: Install dependencies
        run: flutter pub get

      # 3. Verificar el formato de Flutter (Cambiado de 'flutter format' a 'dart format' como plan de contingencia)
      # Nota: Usamos 'dart format' que es el comando subyacente y más compatible si 'flutter format' falla.
      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed .

      # 4. Analizar el código de Flutter
      - name: Analyze project source
        run: flutter analyze

      # 5. Ejecutar las pruebas de Flutter
      - name: Run tests
        run: flutter test
