# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: Flutter CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # 1. Configurar Flutter (CORREGIDO: Forzamos la instalación de la ÚLTIMA versión 'stable' para obtener el SDK de Dart > 3.10.1)
      - name: Setup Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable' 
          # Aseguramos la última versión estable que contiene una versión de Dart >= 3.10.1
          # Si deseas especificar una versión, usa flutter-version: '3.22.0' (o la más reciente)

      # 2. Obtener dependencias con flutter pub get
      - name: Install dependencies
        run: flutter pub get

      # 3. Verificar el formato de Flutter (Usamos 'dart format' como el comando más compatible en CI)
      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed .

      # 4. Analizar el código de Flutter
      - name: Analyze project source
        run: flutter analyze

      # 5. Ejecutar las pruebas de Flutter
      - name: Run tests
        run: flutter test
